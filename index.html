<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="calculator"> 
        <input id="display" readonly>
        <div id="keys">
            <button onclick="appendToDisplay('+')" class="operator-btn">+</button>
            <button onclick="appendToDisplay('7')" class="num-btn">7</button>
            <button onclick="appendToDisplay('8')" class="num-btn">8</button>
            <button onclick="appendToDisplay('9')" class="num-btn">9</button>
            <button onclick="appendToDisplay('-')" class="operator-btn">-</button>
            <button onclick="appendToDisplay('4')" class="num-btn">4</button>
            <button onclick="appendToDisplay('5')" class="num-btn">5</button>
            <button onclick="appendToDisplay('6')" class="num-btn">6</button>
            <button onclick="appendToDisplay('*')" class="operator-btn">*</button>
            <button onclick="appendToDisplay('1')" class="num-btn">1</button>
            <button onclick="appendToDisplay('2')" class="num-btn">2</button>
            <button onclick="appendToDisplay('3')" class="num-btn">3</button>
            <button onclick="appendToDisplay('/')" class="operator-btn">/</button>
            <button onclick="appendToDisplay('0')" class="num-btn">0</button>
            <button onclick="appendToDisplay('.')" class="num-btn">.</button>
            <button onclick="calculate()" class="eq-btn">=</button>
            <button onclick="clearDisplay()" class="operator-btn">C</button>
            <button id="secret-btn" onclick="showMeme()">🤫</button> <!-- HIDDEN BUTTON -->
        </div>
    </div>

<div id="meme-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); justify-content:center; align-items:center; z-index:9999;">
    <div style="text-align:center; padding: 16px; display:inline-flex; flex-direction:column; align-items:center; justify-content:center;">
        <h2 id="meme-name" style="color:white; font-size:1.5rem; margin-bottom:12px;"></h2>
        <img id="meme-img" src="" style="max-width:100%; max-height:55vh; border-radius:12px; object-fit:contain;">
        <button onclick="closeMeme()" style="margin-top:12px; padding:4px 12px; font-size:0.75rem; border-radius:12px; border:none; background:rgb(105, 102, 102); color:black; font-weight:bold; cursor:pointer; width:auto; display:inline-block;">Close ❌</button>
    </div>
</div>

    <script src="index.js"></script>
</body>
</html>
